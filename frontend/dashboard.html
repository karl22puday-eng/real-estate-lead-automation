<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crestview Realty — Lead Dashboard</title>
  <meta name="description" content="Live CRM dashboard of qualified real-estate leads, scored 0-100 and color-coded by temperature." />
  <style>
    :root {
      --bg:#0f1417; --bg-soft:#161d22; --card:#1b242a; --line:#2c383f;
      --text:#eef3f4; --muted:#9bb0b6; --accent:#d8a24a; --accent-2:#e7c07e;
      --hot:#fb7185; --warm:#fbbf24; --cold:#60a5fa; --radius:14px;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #21303a 0%, transparent 60%),
                  radial-gradient(900px 500px at -10% 110%, #2a2418 0%, transparent 55%), var(--bg);
      padding: 28px 18px;
    }
    .wrap { max-width: 1040px; margin: 0 auto; }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand .dot { width:30px; height:30px; border-radius:7px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow:0 6px 18px rgba(216,162,74,.35); display:grid; place-items:center; color:#1b1206; font-weight:800; }
    .brand b { font-size:18px; } .brand span { color:var(--muted); font-size:13px; display:block; }
    .controls { display:flex; align-items:center; gap:10px; }
    .updated { color:var(--muted); font-size:12px; }
    button { border:1px solid var(--line); background:#10171b; color:var(--text); padding:9px 14px; border-radius:10px; font-size:13px; cursor:pointer; transition:border-color .15s; font-family:inherit; }
    button:hover { border-color:var(--accent); }

    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
    @media (max-width:620px){ .stats{ grid-template-columns:repeat(2,1fr);} }
    .stat { background:linear-gradient(180deg,var(--card),var(--bg-soft)); border:1px solid var(--line); border-radius:var(--radius); padding:16px; }
    .stat .n { font-size:26px; font-weight:700; } .stat .l { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
    .stat.hot .n{ color:var(--hot);} .stat.warm .n{ color:var(--warm);} .stat.cold .n{ color:var(--cold);}

    .panel { background:linear-gradient(180deg,var(--card),var(--bg-soft)); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:13px 16px; font-size:14px; }
    th { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--line); }
    tbody tr { border-bottom:1px solid rgba(44,56,63,.6); }
    tbody tr:last-child { border-bottom:0; }
    tbody tr:hover { background:rgba(216,162,74,.05); }
    .name { font-weight:600; }
    .intent { text-transform:capitalize; }
    .pill { display:inline-block; padding:2px 9px; border-radius:99px; font-size:12px; border:1px solid var(--line); color:var(--muted); }
    .score-cell { display:flex; align-items:center; gap:10px; min-width:120px; }
    .bar { flex:1; height:6px; background:#10171b; border-radius:99px; overflow:hidden; max-width:90px; }
    .bar > i { display:block; height:100%; border-radius:99px; }
    .score-num { font-variant-numeric:tabular-nums; font-weight:600; width:30px; }
    .badge { display:inline-block; padding:3px 10px; border-radius:99px; font-size:12px; font-weight:600; text-transform:capitalize; }
    .badge.hot { background:rgba(251,113,133,.14); color:var(--hot); border:1px solid rgba(251,113,133,.4); }
    .badge.warm { background:rgba(251,191,36,.14); color:var(--warm); border:1px solid rgba(251,191,36,.4); }
    .badge.cold { background:rgba(96,165,250,.14); color:var(--cold); border:1px solid rgba(96,165,250,.4); }
    .stage { color:var(--muted); text-transform:capitalize; }
    .date { color:var(--muted); font-size:13px; white-space:nowrap; }
    .empty, .error { padding:40px; text-align:center; color:var(--muted); }
    .error { color:#fca5a5; }
    .foot { color:var(--muted); font-size:12px; text-align:center; margin-top:16px; }
    .foot a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="dot">C</span>
        <div><b>Crestview Realty</b><span>Lead qualification dashboard</span></div>
      </div>
      <div class="controls">
        <span class="updated" id="updated"></span>
        <button id="refresh">↻ Refresh</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat"><div class="n" id="s-total">–</div><div class="l">Total leads</div></div>
      <div class="stat hot"><div class="n" id="s-hot">–</div><div class="l">Hot</div></div>
      <div class="stat warm"><div class="n" id="s-warm">–</div><div class="l">Warm</div></div>
      <div class="stat cold"><div class="n" id="s-cold">–</div><div class="l">Cold</div></div>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr><th>Lead</th><th>Intent</th><th>Area</th><th>Score</th><th>Temp</th><th>Stage</th><th>Captured</th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="7" class="empty">Loading leads…</td></tr>
        </tbody>
      </table>
    </div>

    <p class="foot">Read-only view via Supabase anon key (RLS-protected, no PII exposed). Part of the
      <a href="https://github.com/karl22puday-eng/real-estate-lead-automation">Real Estate Lead Automation System</a>.</p>
  </div>

  <script>
    // Public anon key — RLS-restricted: can read ONLY the sanitized `leads_public` view (no email/phone).
    // Replace both values with your Supabase project's URL and anon key.
    const SUPABASE_URL = "https://rwarsojufsnceswxwwzk.supabase.co";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YXJzb2p1ZnNuY2Vzd3h3d3prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODg2MjMsImV4cCI6MjA5Nzk2NDYyM30.2lWgWUQtrFhKcjuLomHhUvX1L_cNIfvR7VlVK30a6B0";

    const rowsEl = document.getElementById("rows");
    const fmtDate = (s) => new Date(s).toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    const scoreColor = (t) => t === "hot" ? "var(--hot)" : t === "warm" ? "var(--warm)" : "var(--cold)";
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const cap = (s) => { s = String(s ?? ""); return s ? s.charAt(0).toUpperCase() + s.slice(1) : "—"; };

    async function load() {
      rowsEl.innerHTML = '<tr><td colspan="7" class="empty">Loading leads…</td></tr>';
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_public?select=first_name,intent,property_type,location,score,temperature,stage,created_at&order=score.desc,created_at.desc`, {
          headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` }
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const leads = await res.json();
        render(leads);
        document.getElementById("updated").textContent = "Updated " + new Date().toLocaleTimeString();
      } catch (e) {
        rowsEl.innerHTML = '<tr><td colspan="7" class="error">Could not load leads. ' + esc(e.message) + '</td></tr>';
      }
    }

    function render(leads) {
      const by = (t) => leads.filter(l => l.temperature === t).length;
      document.getElementById("s-total").textContent = leads.length;
      document.getElementById("s-hot").textContent = by("hot");
      document.getElementById("s-warm").textContent = by("warm");
      document.getElementById("s-cold").textContent = by("cold");

      if (!leads.length) {
        rowsEl.innerHTML = '<tr><td colspan="7" class="empty">No leads yet — submit one through the capture form.</td></tr>';
        return;
      }
      rowsEl.innerHTML = leads.map(l => {
        const t = (l.temperature || "cold").toLowerCase();
        const score = Math.max(0, Math.min(100, Number(l.score) || 0));
        const ptype = l.property_type ? ` <span class="pill">${esc(l.property_type)}</span>` : "";
        return `<tr>
          <td class="name">${esc(l.first_name) || "—"}</td>
          <td class="intent">${cap(l.intent)}${ptype}</td>
          <td>${esc(l.location) || "—"}</td>
          <td><div class="score-cell">
            <span class="score-num">${score}</span>
            <span class="bar"><i style="width:${score}%; background:${scoreColor(t)}"></i></span>
          </div></td>
          <td><span class="badge ${t}">${esc(t)}</span></td>
          <td class="stage">${esc(l.stage) || "new"}</td>
          <td class="date">${l.created_at ? fmtDate(l.created_at) : "—"}</td>
        </tr>`;
      }).join("");
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
    setInterval(load, 30000); // auto-refresh every 30s
  </script>
</body>
</html>
</content>
